<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Dashboard</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 32px; text-align: center; }
    .netid { font-size: 2rem; font-weight: bold; color: #003da5; }
    .label { color: #666; margin-bottom: 8px; }
    .badge { display: inline-block; background: #003da5; color: white; border-radius: 4px; padding: 2px 10px; font-size: 0.85rem; margin-bottom: 16px; }
    a { color: #003da5; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">Admin Dashboard</p>
    <p class="netid">{{ netid }}</p>
    <p><span class="badge">admin</span></p>
    <p><a href="/">&larr; Back to home</a></p>
  </div>
</body>
</html>
