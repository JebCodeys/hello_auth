<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello, {{ user.id }}</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 32px; text-align: center; }
    .user-id { font-size: 2rem; font-weight: bold; color: #003da5; }
    .label { color: #666; margin-bottom: 8px; }
    .badge { display: inline-block; background: #003da5; color: white; border-radius: 4px; padding: 2px 10px; font-size: 0.85rem; margin: 0 3px; }
    .badge-local { background: #5a7a5a; }
    a { color: #003da5; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">{% if user.type == "cas" %}Authenticated via UVM CAS{% else %}External user{% endif %}</p>
    <p class="user-id">Hello, {{ user.id }}!</p>
    {% if roles %}
    <p>{% for role in roles | sort %}<span class="badge {% if user.type == 'local' %}badge-local{% endif %}">{{ role }}</span>{% endfor %}</p>
    {% endif %}
    <p><a href="/whoami">Debug info &rarr;</a></p>
    {% if "admin" in roles %}
    <p><a href="/admin">Admin dashboard &rarr;</a></p>
    {% endif %}
    <p><a href="/logout">Log out</a></p>
  </div>
</body>
</html>
