<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello, {{ netid }}</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 32px; text-align: center; }
    .netid { font-size: 2rem; font-weight: bold; color: #003da5; }
    .label { color: #666; margin-bottom: 8px; }
    .badge { display: inline-block; background: #003da5; color: white; border-radius: 4px; padding: 2px 10px; font-size: 0.85rem; margin: 0 3px; }
    a { color: #003da5; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <p class="label">Authenticated via UVM CAS</p>
    <p class="netid">Hello, {{ netid }}!</p>
    {% if roles %}
    <p>{% for role in roles | sort %}<span class="badge">{{ role }}</span>{% endfor %}</p>
    {% endif %}
    <p><a href="/whoami">Debug info &rarr;</a></p>
    {% if "admin" in roles %}
    <p><a href="/admin">Admin dashboard &rarr;</a></p>
    {% endif %}
    <p><a href="/logout">Log out &rarr;</a></p>
  </div>
</body>
</html>
