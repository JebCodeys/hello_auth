<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Moderator Dashboard</title>
  <style>
    body { font-family: sans-serif; max-width: 760px; margin: 60px auto; padding: 0 20px; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 32px; margin-bottom: 24px; }
    h2 { margin-top: 0; color: #003da5; }
    .user-id { font-size: 1.4rem; font-weight: bold; color: #003da5; }
    .badge { display: inline-block; background: #003da5; color: white; border-radius: 4px; padding: 2px 10px; font-size: 0.85rem; margin-right: 4px; }
    .badge-admin { background: #7b3fa0; }
    a { color: #003da5; font-size: 0.9rem; }
    .placeholder { color: #888; font-size: 0.9rem; font-style: italic; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Moderator Dashboard</h2>
    <p class="user-id">{{ user.id }}</p>
    <p>
      {% for role in roles | sort %}
        <span class="badge {% if role == 'admin' %}badge-admin{% endif %}">{{ role }}</span>
      {% endfor %}
    </p>
    <p><a href="/">&larr; Back to home</a></p>
  </div>

  <div class="card">
    <h2>Moderation Tools</h2>
    <p class="placeholder">Moderator-specific tools will appear here.</p>
  </div>
</body>
</html>
