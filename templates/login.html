<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Error</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 80px auto; padding: 0 20px; }
    .card { border: 1px solid #ccc; border-radius: 8px; padding: 32px; text-align: center; }
    h2 { color: #c0392b; }
    a { color: #003da5; font-size: 0.9rem; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Authentication Error</h2>
    {% if error %}
    <p>{{ error }}</p>
    {% else %}
    <p>CAS authentication failed.</p>
    {% endif %}
    <p><a href="/login">Try again &rarr;</a></p>
  </div>
</body>
</html>
